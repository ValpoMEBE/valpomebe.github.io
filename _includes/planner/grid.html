<!-- Stats banner -->
<div id="planner-stats" class="planner-stats" style="display:none;">
  <button class="rearrange-toggle-btn" id="rearrange-toggle-btn" onclick="toggleRearrangeMode()">Rearrange Schedule</button>
  <button class="rearrange-toggle-btn" id="download-plan-btn" onclick="downloadPlanExcel()">Download Excel</button>
  <div class="planner-stat">
    <span class="planner-stat-value" id="planner-total-credits">0</span>
    <span class="planner-stat-label">Total Credits</span>
  </div>
  <div class="planner-stat">
    <span class="planner-stat-value" id="planner-semesters">0</span>
    <span class="planner-stat-label">Semesters</span>
  </div>
  <div class="planner-stat">
    <span class="planner-stat-value" id="planner-shared">0</span>
    <span class="planner-stat-label">Shared Courses</span>
  </div>
  <div class="planner-stat">
    <span class="planner-stat-value" id="planner-shared-credits">0</span>
    <span class="planner-stat-label">Shared Credits</span>
  </div>
</div>

<!-- Overload warning -->
<div id="planner-warning" class="planner-warning" style="display:none;"></div>

<!-- Rearrange controls -->
<div id="rearrange-controls" class="rearrange-controls" style="display:none;">
  <div class="rearrange-actions">
    <button class="rearrange-save-btn" onclick="exitRearrangeMode(true)">Save Changes</button>
    <button class="rearrange-cancel-btn" onclick="exitRearrangeMode(false)">Cancel</button>
  </div>
</div>

<!-- Semester grid -->
<div id="planner-area" class="planner-area" style="display:none;">
  <div id="planner-grid" class="planner-grid"></div>
</div>

<!-- Overflow (courses that couldn't fit) -->
<div id="planner-overflow" class="planner-overflow" style="display:none;">
  <h4>Could Not Schedule</h4>
  <div id="planner-overflow-list" class="planner-overflow-list"></div>
</div>
