<!-- Requirements Check Panel -->
<div id="planner-req-panel" class="planner-req-panel" style="display:none;">
  <div class="req-panel-header" onclick="toggleReqPanel()">
    <span class="req-panel-title">Requirements Check</span>
    <span class="req-panel-summary" id="req-panel-summary"></span>
    <span class="req-panel-arrow" id="req-panel-arrow">&#9660;</span>
  </div>
  <div class="req-panel-body" id="req-panel-body" style="display:none;">
    <!-- Primary program section -->
    <div id="req-primary-section" class="req-section"></div>
    <!-- Secondary program section -->
    <div id="req-secondary-section" class="req-section" style="display:none;"></div>
    <!-- Minor sections -->
    <div id="req-minors-section" class="req-section" style="display:none;"></div>
    <!-- CC Scholar section -->
    <div id="req-cc-section" class="req-section" style="display:none;"></div>
  </div>
</div>
