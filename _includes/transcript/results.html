<div id="results-section" class="results-section" style="display:none;">

  <!-- Summary bar -->
  <div id="summary-bar" class="summary-bar">
    <div class="summary-stat">
      <span class="stat-value" id="stat-completed">0</span>
      <span class="stat-label">Credits Done</span>
    </div>
    <div class="summary-stat">
      <span class="stat-value" id="stat-remaining">0</span>
      <span class="stat-label">Credits Left</span>
    </div>
    <div class="summary-stat">
      <span class="stat-value" id="stat-gpa">--</span>
      <span class="stat-label">GPA</span>
    </div>
    <div class="summary-stat stat-progress">
      <span class="stat-value" id="stat-pct">0%</span>
      <span class="stat-label">Progress</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
  </div>

  <!-- Zoom controls -->
  <div class="zoom-controls" id="zoom-controls">
    <button class="zoom-btn" onclick="zoomOut()" title="Zoom out">&minus;</button>
    <span class="zoom-level" id="zoom-level">100%</span>
    <button class="zoom-btn" onclick="zoomIn()" title="Zoom in">&plus;</button>
  </div>

  <!-- Semester grid -->
  <div id="audit-area" class="audit-area">
    <svg id="audit-arrow-svg">
      <defs>
        <marker id="aPre"   markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0 0,7 3.5,0 7" fill="rgba(92,48,0,.65)"/></marker>
        <marker id="aPreHi" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0 0,7 3.5,0 7" fill="#006354"/></marker>
        <marker id="aUnHi"  markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0 0,7 3.5,0 7" fill="#6BC9C9"/></marker>
        <marker id="aCo"    markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0 0,7 3.5,0 7" fill="rgba(199,105,23,.65)"/></marker>
        <marker id="aCoHi"  markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0 0,7 3.5,0 7" fill="#C76917"/></marker>
      </defs>
    </svg>
    <div id="audit-grid" class="audit-grid"></div>
  </div>

  <!-- Unmatched courses -->
  <div id="unmatched-section" class="unmatched-section" style="display:none;">
    <h3 class="unmatched-title">Additional Courses (not in degree map)</h3>
    <div id="unmatched-list" class="unmatched-list"></div>
  </div>

  <!-- Secondary major audit (double major) -->
  <div id="secondary-major-section" class="secondary-major-section" style="display:none;">
    <div class="secondary-major-header">
      <h3 class="secondary-major-title" id="secondary-major-title">Secondary Major</h3>
      <div id="secondary-aab" class="secondary-aab"></div>
    </div>
    <div id="secondary-summary-bar" class="summary-bar"></div>
    <div class="secondary-view-toggle" id="secondary-view-toggle">
      <!-- Populated dynamically: Timeline + Requirements for engineering, Requirements only for others -->
    </div>
    <div id="secondary-audit-area" class="audit-area">
      <div id="secondary-audit-grid" class="audit-grid"></div>
    </div>
    <div id="secondary-unmatched-section" class="unmatched-section" style="display:none;">
      <h3 class="unmatched-title">Additional Courses (not in secondary major)</h3>
      <div id="secondary-unmatched-list" class="unmatched-list"></div>
    </div>
  </div>

  <!-- Minor audit results -->
  <div id="minor-results-section" class="minor-results-section" style="display:none;">
    <h3 class="minor-results-title">Minor Audits</h3>
    <div id="minor-results-container"></div>
  </div>

  <!-- Christ College results -->
  <div id="cc-results-section" class="minor-results-section" style="display:none;">
    <h3 class="minor-results-title">Christ College Scholar</h3>
    <div id="cc-results-container"></div>
  </div>

  <div class="audit-btn-row">
    <button class="plan-btn" id="excel-btn" onclick="downloadAuditExcel()" style="display:none;">Download Audit Summary</button>
    <button class="plan-btn" id="plan-btn" onclick="showPlanner()" style="display:none;">Plan Remaining Semesters</button>
  </div>
  <div class="audit-btn-row">
    <button class="reset-btn" id="csv-btn" onclick="downloadCSV()" style="display:none;">Download Anonymized CSV</button>
    <button class="reset-btn" onclick="resetAudit()">Upload Another Transcript</button>
  </div>
</div>

<!-- Detail panel (bottom popup) -->
<div id="audit-detail-panel">
  <button id="audit-panel-close" onclick="clearAuditSelection()">&#x2715;</button>
  <div id="audit-panel-code"></div>
  <div id="audit-panel-title"></div>
  <div id="audit-panel-meta">
    <span class="audit-panel-credits" id="audit-panel-credits"></span>
  </div>
  <div id="audit-panel-desc"></div>
  <div class="audit-panel-relations">
    <div class="audit-rel-group prereqs"> <h5>&#9654; Prerequisites</h5>  <div id="audit-panel-prereqs"></div></div>
    <div class="audit-rel-group coreqs">  <h5>&#8634; Co-requisites</h5> <div id="audit-panel-coreqs"></div></div>
    <div class="audit-rel-group unlocked"><h5>&#8599; Unlocks</h5>        <div id="audit-panel-unlocked"></div></div>
  </div>
  <div id="audit-panel-eligible"></div>
</div>
