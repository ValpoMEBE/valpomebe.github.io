<!-- Program selector — always visible so user can swap after parsing -->
<div class="program-controls-bar">
  <div class="program-controls">
    <span class="prog-label">Program:</span>
    <button class="prog-btn active" onclick="selectProgram('ME', this)">Mechanical Engineering</button>
    <button class="prog-btn"        onclick="selectProgram('BE', this)">Bioengineering</button>
    <div id="track-selector">
      <button class="track-btn active" data-track="BE_Biomech" onclick="selectTrack('BE_Biomech', this)">Biomechanical</button>
      <button class="track-btn"        data-track="BE_Bioelec" onclick="selectTrack('BE_Bioelec', this)">Bioelectrical</button>
      <button class="track-btn"        data-track="BE_Biomed"  onclick="selectTrack('BE_Biomed',  this)">Biomedical</button>
    </div>
  </div>
</div>

<!-- Minor selector — collapsible picker with tag pills -->
<div class="minor-controls-bar">
  <button class="minor-toggle" onclick="toggleMinorPicker()">
    <span class="prog-label">Minors (optional)</span>
    <span class="minor-toggle-arrow">&#9660;</span>
  </button>
  <div id="minor-tags" class="minor-tags"></div>
  <div id="minor-picker" class="minor-picker" style="display:none;">
    <!-- JS populates checkboxes from MINORS_DATA -->
  </div>
</div>

<div id="upload-section" class="upload-section">
  <h1 class="upload-title">Transcript Audit</h1>
  <p class="upload-subtitle">Upload your DataVU transcript to see your degree progress.</p>

  <div id="drop-zone" class="drop-zone">
    <div class="drop-zone-content">
      <span class="drop-icon">&#128196;</span>
      <p class="drop-text">Drag & drop your transcript PDF or CSV here</p>
      <p class="drop-or">or</p>
      <label class="file-btn">
        Choose File
        <input type="file" id="file-input" accept=".pdf,.csv" hidden>
      </label>
    </div>
  </div>

  <div id="file-info" class="file-info" style="display:none;">
    <span id="file-name" class="file-name"></span>
    <button class="file-clear" onclick="clearFile()" title="Remove file">&times;</button>
  </div>

  <button id="parse-btn" class="parse-btn" disabled onclick="parseTranscript()">Parse Transcript</button>

  <div id="parse-error" class="parse-error" style="display:none;"></div>
</div>
