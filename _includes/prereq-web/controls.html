<div class="pw-controls">
  <span class="pw-label">Program:</span>
  <button class="pw-btn active" onclick="pwSetProgram('MEBE', this)">ME/BE</button>
  <button class="pw-btn"        onclick="pwSetProgram('ME', this)">ME</button>
  <button class="pw-btn"        onclick="pwSetProgram('BE_Biomech', this)">BE Biomech</button>
  <button class="pw-btn"        onclick="pwSetProgram('BE_Bioelec', this)">BE Bioelec</button>
  <button class="pw-btn"        onclick="pwSetProgram('BE_Biomed', this)">BE Biomed</button>
  <button class="pw-btn"        onclick="pwSetProgram('EECPE', this)">EE/CPE</button>
  <button class="pw-btn"        onclick="pwSetProgram('EE', this)">EE</button>
  <button class="pw-btn"        onclick="pwSetProgram('CPE', this)">CPE</button>
  <button class="pw-btn"        onclick="pwSetProgram('CEENE', this)">CE/ENE</button>
  <button class="pw-btn"        onclick="pwSetProgram('CE', this)">CE</button>
  <button class="pw-btn"        onclick="pwSetProgram('ENE', this)">ENE</button>
  <div class="pw-zoom">
    <button class="zoom-btn" onclick="pwZoomOut()" title="Zoom out">&minus;</button>
    <span class="zoom-level" id="pw-zoom-level">100%</span>
    <button class="zoom-btn" onclick="pwZoomIn()" title="Zoom in">&#x2b;</button>
    <button class="zoom-btn" onclick="pwFitView()" title="Fit to view" style="font-size:.65rem;width:auto;padding:0 .5rem;">Fit</button>
  </div>
</div>
