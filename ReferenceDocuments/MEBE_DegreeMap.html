<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ME / BE Degree Map — Valparaiso University</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --yellow:      #FFE300;
  --gold:        #F5B80A;
  --brown:       #5C3000;
  --dark-brown:  #331A00;
  --white:       #FFFFFF;
  --light-blue:  #6BC9C9;
  --teal:        #006354;
  --orange:      #C76917;
  --magenta:     #A80087;
  --light-gray:  #DAD9D6;
  --parchment:   #F9F2E3;
  --parchment-d: #EDE3CC;
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body:    'Source Sans 3', sans-serif;
  --font-mono:    'IBM Plex Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body { font-family: var(--font-body); background: var(--dark-brown); color: var(--white); min-height: 100vh; overflow-x: hidden; }
button { cursor: pointer; font-family: var(--font-body); }

/* ── HEADER ─────────────────────────────────────────────────── */
#app-header {
  background: var(--brown);
  border-bottom: 3px solid var(--gold);
  padding: .75rem 1.5rem;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: .75rem;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,.4);
}
.header-left { display: flex; align-items: center; gap: 1rem; }
.valpo-wordmark { display: flex; flex-direction: column; line-height: 1; }
.valpo-wordmark .valpo   { font-family: var(--font-display); font-size: 1.4rem; color: var(--yellow); letter-spacing: .02em; }
.valpo-wordmark .subtitle { font-size: .7rem; color: var(--light-gray); letter-spacing: .12em; text-transform: uppercase; margin-top: .1rem; }
.header-title { font-family: var(--font-display); font-size: 1.1rem; color: var(--white); border-left: 2px solid var(--gold); padding-left: 1rem; }
.program-controls { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }
.prog-label { font-size: .7rem; color: var(--light-gray); text-transform: uppercase; letter-spacing: .1em; margin-right: .25rem; }
.prog-btn {
  background: rgba(255,255,255,.08); border: 1.5px solid rgba(255,255,255,.2);
  color: var(--light-gray); padding: .35rem .9rem; border-radius: 4px;
  font-size: .8rem; font-weight: 600; letter-spacing: .06em; transition: all .18s;
}
.prog-btn:hover  { border-color: var(--gold); color: var(--gold); }
.prog-btn.active { background: var(--gold); border-color: var(--gold); color: var(--dark-brown); }
#track-selector { display: none; align-items: center; gap: .4rem; border-left: 1px solid rgba(255,255,255,.2); padding-left: .75rem; margin-left: .25rem; }
#track-selector.visible { display: flex; }
.track-btn {
  background: transparent; border: 1.5px solid rgba(107,201,201,.4);
  color: var(--light-blue); padding: .3rem .7rem; border-radius: 4px;
  font-size: .72rem; font-weight: 600; letter-spacing: .05em; transition: all .18s;
}
.track-btn:hover  { border-color: var(--light-blue); background: rgba(107,201,201,.1); }
.track-btn.active { background: var(--light-blue); border-color: var(--light-blue); color: var(--dark-brown); }

/* ── TAG FILTER BAR ─────────────────────────────────────────── */
#tag-bar {
  background: rgba(0,0,0,.35);
  border-bottom: 1px solid rgba(245,184,10,.2);
  padding: .5rem 1.5rem;
  display: flex; align-items: center; gap: .4rem; flex-wrap: wrap;
  position: sticky; top: 57px; z-index: 99;
}
.tag-bar-label { font-size: .65rem; text-transform: uppercase; letter-spacing: .12em; color: var(--light-gray); margin-right: .3rem; white-space: nowrap; }
.tag-filter-btn {
  border: none; padding: .22rem .65rem; border-radius: 100px;
  font-size: .68rem; font-weight: 600; letter-spacing: .05em; text-transform: uppercase;
  cursor: pointer; transition: all .15s; opacity: .6; white-space: nowrap;
}
.tag-filter-btn:hover  { opacity: 1; transform: translateY(-1px); }
.tag-filter-btn.active { opacity: 1; box-shadow: 0 0 0 2px white, 0 0 10px rgba(255,255,255,.3); }

/* ── MAIN FLOWCHART AREA ─────────────────────────────────────── */
#main-area { position: relative; padding: 1.25rem 1.5rem 240px; overflow-x: auto; overflow-y: auto; }
#flowchart  { display: flex; gap: 0; min-width: max-content; position: relative; }
#arrow-svg  { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; }

/* ── SEMESTER COLUMNS ────────────────────────────────────────── */
.sem-col    { width: 176px; flex-shrink: 0; display: flex; flex-direction: column; padding: 0 6px; }
.sem-header { text-align: center; margin-bottom: .6rem; padding: .4rem .3rem; border-bottom: 2px solid var(--gold); }
.sem-year   { font-size: .58rem; text-transform: uppercase; letter-spacing: .14em; color: var(--gold); opacity: .7; }
.sem-name   { font-family: var(--font-display); font-size: .85rem; color: var(--white); margin: .05rem 0; }
.sem-total  { font-family: var(--font-mono); font-size: .6rem; color: var(--light-gray); opacity: .6; }
.sem-cards  { display: flex; flex-direction: column; gap: .45rem; flex: 1; }

/* ── COURSE CARDS ────────────────────────────────────────────── */
.course-card {
  position: relative;
  background: var(--parchment);
  border: 1.5px solid var(--parchment-d);
  border-radius: 6px;
  padding: .5rem .55rem .4rem;
  cursor: pointer;
  transition: opacity .2s, border-color .2s, box-shadow .2s, transform .15s;
  will-change: opacity, border-color;
  min-height: 58px;
}
.course-card:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,.35); border-color: var(--gold); z-index: 2; }
.course-card.is-placeholder { background: transparent; border: 1.5px dashed rgba(245,184,10,.35); }
.course-card.is-placeholder .card-code  { color: var(--gold); opacity: .7; }
.course-card.is-placeholder .card-title { color: rgba(255,255,255,.5); font-style: italic; }
.credit-badge {
  position: absolute; top: .3rem; right: .35rem;
  font-family: var(--font-mono); font-size: .6rem;
  color: var(--brown); background: rgba(92,48,0,.12);
  border-radius: 3px; padding: .05rem .28rem; font-weight: 500;
}
.is-placeholder .credit-badge { color: var(--gold); background: rgba(245,184,10,.12); }
.card-code  { font-family: var(--font-mono); font-size: .65rem; font-weight: 500; color: var(--brown); line-height: 1; padding-right: 1.8rem; }
.card-title { font-size: .72rem; font-weight: 600; color: var(--dark-brown); line-height: 1.25; margin-top: .18rem; padding-right: 1rem; }
.card-tags  { display: flex; flex-wrap: wrap; gap: .22rem; margin-top: .3rem; }
.card-tag   { font-size: .54rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; padding: .1rem .35rem; border-radius: 100px; color: white; line-height: 1.4; }

/* ── CARD STATES ─────────────────────────────────────────────── */
.course-card.state-dimmed   { opacity: .08; pointer-events: none; }
.course-card.state-selected { border-color: var(--yellow)     !important; box-shadow: 0 0 0 2px var(--yellow),     0 4px 20px rgba(255,227,0,.3)   !important; opacity: 1 !important; z-index: 5; }
.course-card.state-prereq   { border-color: var(--teal)       !important; box-shadow: 0 0 0 1.5px var(--teal),     0 2px 12px rgba(0,99,84,.25)   !important; opacity: 1 !important; }
.course-card.state-coreq    { border-color: var(--orange)     !important; box-shadow: 0 0 0 1.5px var(--orange),   0 2px 12px rgba(199,105,23,.25)!important; opacity: 1 !important; }
.course-card.state-unlocked { border-color: var(--light-blue) !important; box-shadow: 0 0 0 1.5px var(--light-blue),0 2px 12px rgba(107,201,201,.2)!important; opacity: 1 !important; }
.course-card.state-tag-match { opacity: 1 !important; box-shadow: 0 2px 12px rgba(0,0,0,.2); }

/* ── ELECTIVE DROPDOWN ───────────────────────────────────────── */
.expand-btn {
  width: 100%; background: transparent; border: none;
  border-top: 1px solid rgba(245,184,10,.2);
  color: var(--gold); font-size: .6rem; padding: .25rem 0; margin-top: .3rem;
  text-align: center; letter-spacing: .06em; opacity: .65; transition: opacity .15s;
}
.expand-btn:hover { opacity: 1; }
.eligible-list { display: none; flex-direction: column; gap: .15rem; margin-top: .25rem; border-top: 1px solid rgba(245,184,10,.15); padding-top: .25rem; }
.eligible-list.open { display: flex; }
.eligible-item { font-size: .59rem; color: rgba(255,255,255,.55); font-style: italic; line-height: 1.35; padding-left: .3rem; border-left: 1.5px solid rgba(245,184,10,.3); }

/* ── ARROWS ──────────────────────────────────────────────────── */
/* Default state: visible but unemphasized */
.arrow-prereq { stroke: rgba(92,48,0,.55); stroke-width: 2;   fill: none; }
.arrow-coreq  { stroke: rgba(199,105,23,.5); stroke-width: 2; fill: none; stroke-dasharray: 5,3; }
/* Highlighted (course selected) */
.arrow-prereq.hi-prereq  { stroke: var(--teal);       stroke-width: 3; opacity: 1; }
.arrow-prereq.hi-unlocked{ stroke: var(--light-blue); stroke-width: 3; opacity: 1; }
.arrow-coreq.hi-coreq    { stroke: var(--orange);     stroke-width: 3; opacity: 1; stroke-dasharray: 5,3; }
/* Dimmed (unrelated arrows when a course is selected) */
.arrow-prereq.fade, .arrow-coreq.fade { opacity: .06; }

/* ── LEGEND ──────────────────────────────────────────────────── */
#legend {
  position: fixed; bottom: 1rem; right: 1rem;
  background: rgba(51,26,0,.93); border: 1px solid rgba(245,184,10,.3);
  border-radius: 8px; padding: .65rem .85rem;
  font-size: .62rem; z-index: 90; backdrop-filter: blur(4px); max-width: 185px;
}
#legend h4 { font-family: var(--font-display); font-size: .72rem; color: var(--gold); margin-bottom: .45rem; letter-spacing: .04em; }
.legend-row { display: flex; align-items: center; gap: .45rem; margin-bottom: .28rem; color: var(--light-gray); }
.legend-box { width: 14px; height: 10px; border-radius: 2px; border-width: 2px; border-style: solid; flex-shrink: 0; }

/* ── DETAIL PANEL ────────────────────────────────────────────── */
#detail-panel {
  position: fixed; bottom: -320px; left: 0; right: 0;
  background: var(--white); border-top: 3px solid var(--gold);
  padding: 1rem 1.5rem 1.25rem; z-index: 200;
  transition: bottom .28s cubic-bezier(.4,0,.2,1);
  max-height: 300px; overflow-y: auto; color: var(--dark-brown);
}
#detail-panel.open { bottom: 0; }
#panel-close {
  position: absolute; top: .75rem; right: 1rem;
  background: var(--parchment-d); border: none;
  width: 26px; height: 26px; border-radius: 50%;
  font-size: 1rem; color: var(--brown);
  display: flex; align-items: center; justify-content: center;
}
#panel-close:hover { background: var(--gold); color: var(--dark-brown); }
#panel-code    { font-family: var(--font-mono); font-size: .75rem; color: var(--brown); font-weight: 500; }
#panel-title   { font-family: var(--font-display); font-size: 1.15rem; color: var(--dark-brown); margin: .1rem 0 .5rem; }
#panel-meta    { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: .6rem; align-items: center; }
.panel-credits { font-family: var(--font-mono); font-size: .72rem; background: var(--parchment-d); border-radius: 4px; padding: .15rem .5rem; color: var(--brown); }
#panel-tags    { display: flex; gap: .3rem; flex-wrap: wrap; }
#panel-desc    { font-size: .78rem; color: #4a3000; line-height: 1.55; margin-bottom: .65rem; }
.panel-relations { display: grid; grid-template-columns: repeat(3,1fr); gap: .65rem; }
.rel-group h5  { font-size: .62rem; text-transform: uppercase; letter-spacing: .1em; margin-bottom: .3rem; font-weight: 700; }
.rel-group.prereqs  h5 { color: var(--teal); }
.rel-group.coreqs   h5 { color: var(--orange); }
.rel-group.unlocked h5 { color: #1a7fa0; }
.rel-pill      { display: inline-block; font-family: var(--font-mono); font-size: .6rem; padding: .12rem .4rem; border-radius: 3px; margin: .1rem .1rem 0 0; cursor: pointer; font-weight: 500; }
.rel-pill:hover { text-decoration: underline; }
.prereq-pill   { background: rgba(0,99,84,.12);     color: var(--teal); }
.coreq-pill    { background: rgba(199,105,23,.12);   color: var(--orange); }
.unlock-pill   { background: rgba(107,201,201,.15);  color: #1a7fa0; }
.none-label    { font-size: .65rem; color: var(--light-gray); font-style: italic; }
#panel-eligible { margin-top: .65rem; }
#panel-eligible h5 { font-size: .62rem; text-transform: uppercase; letter-spacing: .1em; color: var(--gold); margin-bottom: .3rem; font-weight: 700; }
.eligible-panel-list { display: flex; flex-direction: column; gap: .2rem; }
.eligible-panel-item { font-size: .7rem; color: #4a3000; padding: .18rem .5rem; border-left: 2px solid var(--gold); background: rgba(245,184,10,.06); border-radius: 0 3px 3px 0; }

/* ── TOOLTIP ─────────────────────────────────────────────────── */
#tooltip {
  position: fixed; background: rgba(51,26,0,.95); border: 1px solid var(--gold);
  color: var(--white); font-size: .65rem; padding: .3rem .6rem;
  border-radius: 4px; pointer-events: none; opacity: 0; transition: opacity .12s;
  z-index: 300; max-width: 220px; line-height: 1.4;
}
#tooltip.vis { opacity: 1; }

@media (max-width: 700px) {
  .header-title { display: none; }
  .panel-relations { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header id="app-header">
  <div class="header-left">
    <div class="valpo-wordmark">
      <span class="valpo">VALPO</span>
      <span class="subtitle">Valparaiso University</span>
    </div>
    <div class="header-title">ME / BE Degree Map</div>
  </div>
  <div class="program-controls">
    <span class="prog-label">Program:</span>
    <button class="prog-btn active" onclick="setProgram('ME', this)">BSME</button>
    <button class="prog-btn"        onclick="setProgram('BE', this)">BSBE</button>
    <div id="track-selector">
      <button class="track-btn active" data-track="BE_Biomech" onclick="setTrack('BE_Biomech', this)">Biomechanical</button>
      <button class="track-btn"        data-track="BE_Bioelec" onclick="setTrack('BE_Bioelec', this)">Bioelectrical</button>
      <button class="track-btn"        data-track="BE_Biomed"  onclick="setTrack('BE_Biomed',  this)">Biomedical</button>
    </div>
  </div>
</header>

<div id="tag-bar"></div>

<main id="main-area">
  <div id="flowchart">
    <svg id="arrow-svg">
      <defs>
        <!-- Prereq arrow markers -->
        <marker id="mPre"   markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0 0,7 3.5,0 7" fill="rgba(92,48,0,.65)"/></marker>
        <marker id="mPreHi" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0 0,7 3.5,0 7" fill="#006354"/></marker>
        <marker id="mUnHi"  markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0 0,7 3.5,0 7" fill="#6BC9C9"/></marker>
        <!-- Coreq arrow markers -->
        <marker id="mCo"    markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0 0,7 3.5,0 7" fill="rgba(199,105,23,.65)"/></marker>
        <marker id="mCoHi"  markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0 0,7 3.5,0 7" fill="#C76917"/></marker>
      </defs>
    </svg>
  </div>
</main>

<div id="legend">
  <h4>Legend</h4>
  <div class="legend-row">
    <svg width="28" height="10"><line x1="0" y1="5" x2="22" y2="5" stroke="rgba(92,48,0,.7)" stroke-width="2"/><polygon points="22,2 28,5 22,8" fill="rgba(92,48,0,.7)"/></svg>
    <span>Prerequisite</span>
  </div>
  <div class="legend-row">
    <svg width="28" height="10"><line x1="0" y1="5" x2="22" y2="5" stroke="rgba(199,105,23,.7)" stroke-width="2" stroke-dasharray="4,2"/><polygon points="22,2 28,5 22,8" fill="rgba(199,105,23,.7)"/></svg>
    <span>Co-requisite</span>
  </div>
  <div style="margin-top:.45rem; border-top: 1px solid rgba(255,255,255,.1); padding-top:.4rem">
    <div class="legend-row"><div class="legend-box" style="border-color:#FFE300"></div><span>Selected</span></div>
    <div class="legend-row"><div class="legend-box" style="border-color:#006354"></div><span>Prerequisite of</span></div>
    <div class="legend-row"><div class="legend-box" style="border-color:#C76917"></div><span>Co-requisite of</span></div>
    <div class="legend-row"><div class="legend-box" style="border-color:#6BC9C9"></div><span>Unlocked by</span></div>
  </div>
</div>

<div id="detail-panel">
  <button id="panel-close" onclick="clearSelection()">&#x2715;</button>
  <div id="panel-code"></div>
  <div id="panel-title"></div>
  <div id="panel-meta">
    <span class="panel-credits" id="panel-credits"></span>
    <div id="panel-tags"></div>
  </div>
  <div id="panel-desc"></div>
  <div class="panel-relations">
    <div class="rel-group prereqs"> <h5>&#9654; Prerequisites</h5>  <div id="panel-prereqs"></div></div>
    <div class="rel-group coreqs">  <h5>&#8634; Co-requisites</h5> <div id="panel-coreqs"></div></div>
    <div class="rel-group unlocked"><h5>&#8599; Unlocks</h5>        <div id="panel-unlocked"></div></div>
  </div>
  <div id="panel-eligible"></div>
</div>

<div id="tooltip"></div>

<script>
// ╔══════════════════════════════════════════════════════════════╗
// ║  TAG DEFINITIONS                                             ║
// ║  To add/remove a filter tag, edit this object only.         ║
// ╚══════════════════════════════════════════════════════════════╝
const TAGS = {
  math:         { label: "Math",           bg: "#F5B80A", fg: "#1a0e00" },
  physics:      { label: "Physics",        bg: "#5A8FA8", fg: "#fff"    },
  mechanics:    { label: "Mechanics",      bg: "#7A3E00", fg: "#fff"    },
  thermalFluids:{ label: "Thermal/Fluids", bg: "#C76917", fg: "#fff"    },
  materials:    { label: "Materials",      bg: "#006354", fg: "#fff"    },
  electrical:   { label: "Electrical",     bg: "#A80087", fg: "#fff"    },
  biology:      { label: "Biology",        bg: "#2E7D6B", fg: "#fff"    },
  systems:      { label: "Systems",        bg: "#1A5C88", fg: "#fff"    },
  design:       { label: "Design",         bg: "#D4A000", fg: "#1a0e00" },
  computing:    { label: "Computing",      bg: "#4A2800", fg: "#e8d5b0" },
  lab:          { label: "Lab",            bg: "#5A6068", fg: "#fff"    },
};

// ╔══════════════════════════════════════════════════════════════╗
// ║  SEMESTER METADATA                                           ║
// ╚══════════════════════════════════════════════════════════════╝
const SEMESTERS = [
  { s: 1, year: "Freshman Year",   season: "Fall"   },
  { s: 2, year: "Freshman Year",   season: "Spring" },
  { s: 3, year: "Sophomore Year",  season: "Fall"   },
  { s: 4, year: "Sophomore Year",  season: "Spring" },
  { s: 5, year: "Junior Year",     season: "Fall"   },
  { s: 6, year: "Junior Year",     season: "Spring" },
  { s: 7, year: "Senior Year",     season: "Fall"   },
  { s: 8, year: "Senior Year",     season: "Spring" },
];

// ╔══════════════════════════════════════════════════════════════╗
// ║  COURSE DATA                                                 ║
// ║                                                              ║
// ║  Fields:                                                     ║
// ║    id           — unique key (matches object key)            ║
// ║    code         — display course code                        ║
// ║    title        — full course name                           ║
// ║    credits      — credit hours (number)                      ║
// ║    tags         — array of tag keys from TAGS above          ║
// ║    prereqs      — array of course ids that must come before  ║
// ║    coreqs       — array of course ids taken concurrently     ║
// ║    semesters    — { program: semesterNumber, ... }           ║
// ║                   Programs: ME, BE_Biomech, BE_Bioelec,      ║
// ║                             BE_Biomed                        ║
// ║    isPlaceholder— true for elective/placeholder cards        ║
// ║    eligible     — array of strings for elective dropdown     ║
// ║    desc         — description shown in detail panel          ║
// ╚══════════════════════════════════════════════════════════════╝
const COURSES = {

  // ════════════════════════════════════════════════════════
  // YEAR 1 — FALL (Semester 1) — All Programs
  // ════════════════════════════════════════════════════════

  VUE_101: {
    id: "VUE_101", code: "VUE 101", title: "Exploring Values", credits: 4,
    tags: [],
    prereqs: [], coreqs: [],
    semesters: { ME: 1, BE_Biomech: 1, BE_Bioelec: 1, BE_Biomed: 1 },
    desc: "Valparaiso University Experience: Exploring Values. Introduction to liberal education, the university, and vocational discernment.",
  },

  GE_100: {
    id: "GE_100", code: "GE 100", title: "Fundamentals of Engineering", credits: 2,
    tags: ["design"],
    prereqs: [], coreqs: [],
    semesters: { ME: 1, BE_Biomech: 1, BE_Bioelec: 1, BE_Biomed: 1 },
    desc: "Introduction to the engineering profession, design process, and basic engineering tools. Includes GE 100L (0 cr lab, listed separately in catalog).",
  },

  XS_101: {
    id: "XS_101", code: "XS 101", title: "Wellness & Stress", credits: 1,
    tags: [],
    prereqs: [], coreqs: [],
    semesters: { ME: 1, BE_Biomech: 1, BE_Bioelec: 1, BE_Biomed: 1 },
    desc: "Introduction to wellness strategies and stress management.",

const UNLOCKS = {};
for (const c of Object.values(COURSES)) {
  if (!UNLOCKS[c.id]) UNLOCKS[c.id] = [];
  for (const pid of (c.prereqs || [])) {
    if (!UNLOCKS[pid]) UNLOCKS[pid] = [];
    if (!UNLOCKS[pid].includes(c.id)) UNLOCKS[pid].push(c.id);
  }
  for (const cid of (c.coreqs || [])) {
    if (!UNLOCKS[cid]) UNLOCKS[cid] = [];
    if (!UNLOCKS[cid].includes(c.id)) UNLOCKS[cid].push(c.id);
  }
}

  program: "ME",      // "ME" | "BE"

// ║  TAG FILTER BAR                                              ║
// ╚══════════════════════════════════════════════════════════════╝
function buildTagBar() {
  const bar = document.getElementById("tag-bar");
  bar.innerHTML = '<span class="tag-bar-label">Filter:</span>';

  const allBtn = document.createElement("button");
  allBtn.className = "tag-filter-btn active";
  allBtn.textContent = "All";
  allBtn.style.cssText = "background:#5C3000; color:#FFE300;";
  allBtn.dataset.tag = "all";
  allBtn.onclick = () => filterByTag("all", allBtn);
  bar.appendChild(allBtn);

  for (const [key, def] of Object.entries(TAGS)) {
    const btn = document.createElement("button");
    btn.className = "tag-filter-btn";
    btn.textContent = def.label;
    btn.style.cssText = `background:${def.bg}; color:${def.fg};`;
    btn.dataset.tag = key;
    btn.onclick = () => filterByTag(key, btn);
    bar.appendChild(btn);
  }
}


// ╔══════════════════════════════════════════════════════════════╗
// ║  RENDER                                                      ║
// ╚══════════════════════════════════════════════════════════════╝
function render() {
  const prog = currentProg();
  const fc  = document.getElementById("flowchart");
  const svg = document.getElementById("arrow-svg");
  fc.innerHTML = "";
  fc.appendChild(svg);

  SEMESTERS.forEach(({ s, year, season }) => {
    const courses = Object.values(COURSES).filter(c => c.semesters && c.semesters[prog] === s);
    if (!courses.length) return;

    const totalCr = courses.reduce((sum, c) => sum + c.credits, 0);

    const col = document.createElement("div");
    col.className = "sem-col";
    col.dataset.sem = s;
    col.innerHTML = `
      <div class="sem-header">
        <div class="sem-year">${year}</div>
        <div class="sem-name">${season} &middot; Sem ${s}</div>
        <div class="sem-total">${totalCr.toFixed(1)} cr</div>
      </div>
      <div class="sem-cards" id="sc${s}"></div>`;
    fc.appendChild(col);

    const cardsEl = col.querySelector(`#sc${s}`);
    courses.forEach(c => cardsEl.appendChild(makeCard(c)));
  });

  if (STATE.tag && STATE.tag !== "all") filterByTag(STATE.tag, null, true);
  setTimeout(drawArrows, 80);
}

function makeCard(course) {
  const el = document.createElement("div");
  el.className = "course-card" + (course.isPlaceholder ? " is-placeholder" : "");
  el.id = "card-" + course.id;
  el.dataset.id = course.id;

  const tagChips = (course.tags || []).map(t => {
    const def = TAGS[t];
    if (!def) return "";
    return `<span class="card-tag" style="background:${def.bg};color:${def.fg}">${def.label}</span>`;
  }).join("");

  el.innerHTML = `
    <span class="credit-badge">${course.credits} cr</span>
    <div class="card-code">${course.code}</div>
    <div class="card-title">${course.title}</div>
    <div class="card-tags">${tagChips}</div>`;

  // Expandable elective list
  if (course.isPlaceholder && course.eligible && course.eligible.length) {
    const list = document.createElement("div");
    list.className = "eligible-list";
    list.id = "el-" + course.id;
    course.eligible.forEach(e => {
      const item = document.createElement("div");
      item.className = "eligible-item";
      item.textContent = e;
      list.appendChild(item);
    });

    const btn = document.createElement("button");
    btn.className = "expand-btn";
    btn.textContent = "\u25be show eligible courses";
    btn.onclick = ev => {
      ev.stopPropagation();
      const open = list.classList.toggle("open");
      btn.textContent = open ? "\u25b4 hide eligible courses" : "\u25be show eligible courses";
    };

    el.appendChild(btn);
    el.appendChild(list);
  }

  el.onclick = () => selectCourse(course.id);
  return el;
}


// ╔══════════════════════════════════════════════════════════════╗
// ║  COURSE SELECTION & HIGHLIGHTING                             ║
// ╚══════════════════════════════════════════════════════════════╝
function selectCourse(id) {
  if (STATE.selected === id) { clearSelection(); return; }
  STATE.selected = id;

  const course = COURSES[id];
  if (!course) return;

  const prog    = currentProg();
  const prereqs = new Set(course.prereqs || []);
  const coreqs  = new Set(course.coreqs  || []);
  // Unlocks = courses that list THIS course as a prereq or coreq
  const unlocks = new Set(
    (UNLOCKS[id] || []).filter(x => COURSES[x] && COURSES[x].semesters && COURSES[x].semesters[prog])
  );

  document.querySelectorAll(".course-card").forEach(el => {
    const cid = el.dataset.id;
    el.classList.remove("state-selected","state-prereq","state-coreq","state-unlocked","state-dimmed","state-tag-match");
    if      (cid === id)         el.classList.add("state-selected");
    else if (prereqs.has(cid))   el.classList.add("state-prereq");
    else if (coreqs.has(cid))    el.classList.add("state-coreq");
    else if (unlocks.has(cid))   el.classList.add("state-unlocked");
    else                         el.classList.add("state-dimmed");
  });

  highlightArrows(id, prereqs, coreqs, unlocks);
  openPanel(course, prereqs, coreqs, unlocks);
}

function clearSelection() {
  STATE.selected = null;
  document.querySelectorAll(".course-card").forEach(el =>
    el.classList.remove("state-selected","state-prereq","state-coreq","state-unlocked","state-dimmed")
  );
  document.querySelectorAll("#arrow-svg path").forEach(p => {
    p.classList.remove("hi-prereq","hi-unlocked","hi-coreq","fade");
    p.setAttribute("marker-end", p.dataset.type === "prereq" ? "url(#mPre)" : "url(#mCo)");
  });
  document.getElementById("detail-panel").classList.remove("open");
  if (STATE.tag && STATE.tag !== "all") filterByTag(STATE.tag, null, true);
}


// ╔══════════════════════════════════════════════════════════════╗
// ║  TAG FILTERING                                               ║
// ╚══════════════════════════════════════════════════════════════╝
function filterByTag(tag, btn, silent = false) {
  STATE.tag = tag;

  if (!silent) {
    document.querySelectorAll(".tag-filter-btn").forEach(b => b.classList.remove("active"));
    if (btn) {
      btn.classList.add("active");
    } else {
      const match = document.querySelector(`[data-tag="${tag}"]`);
      if (match) match.classList.add("active");
    }
  }

  if (tag === "all") {
    document.querySelectorAll(".course-card").forEach(el =>
      el.classList.remove("state-dimmed","state-tag-match")
    );
    return;
  }

  document.querySelectorAll(".course-card").forEach(el => {
    const c = COURSES[el.dataset.id];
    if (!c) return;
    el.classList.remove("state-dimmed","state-tag-match","state-selected","state-prereq","state-coreq","state-unlocked");
    if (c.tags && c.tags.includes(tag)) {
      el.classList.add("state-tag-match");
    } else {
      el.classList.add("state-dimmed");
    }
  });
}


// ╔══════════════════════════════════════════════════════════════╗
// ║  ARROW DRAWING                                               ║
// ╚══════════════════════════════════════════════════════════════╝
function drawArrows() {
  const svg = document.getElementById("arrow-svg");
  svg.querySelectorAll("path").forEach(p => p.remove());

  const prog = currentProg();
  const mainArea = document.getElementById("main-area");
  const mr = mainArea.getBoundingClientRect();
  const sl = mainArea.scrollLeft;
  const st = mainArea.scrollTop;

  function cardPos(id) {
    const el = document.getElementById("card-" + id);
    if (!el) return null;
    const r = el.getBoundingClientRect();
    return {
      cx: r.left - mr.left + sl + r.width  / 2,
      cy: r.top  - mr.top  + st + r.height / 2,
      rx: r.right  - mr.left + sl,
      lx: r.left   - mr.left + sl,
      ty: r.top    - mr.top  + st,
      by: r.bottom - mr.top  + st,
    };
  }

  const drawn = new Set();

  for (const course of Object.values(COURSES)) {
    if (!course.semesters || !course.semesters[prog]) continue;
    const toPos = cardPos(course.id);
    if (!toPos) continue;

    // Prereq arrows
    for (const pid of (course.prereqs || [])) {
      if (!COURSES[pid] || !COURSES[pid].semesters || !COURSES[pid].semesters[prog]) continue;
      const key = pid + "->" + course.id;
      if (drawn.has(key)) continue;
      drawn.add(key);
      const fromPos = cardPos(pid);
      if (!fromPos) continue;
      svg.appendChild(makePath(fromPos, toPos, false, pid, course.id));
    }

    // Coreq arrows
    for (const cid of (course.coreqs || [])) {
      if (!COURSES[cid] || !COURSES[cid].semesters || !COURSES[cid].semesters[prog]) continue;
      const key = "co:" + [cid, course.id].sort().join("-");
      if (drawn.has(key)) continue;
      drawn.add(key);
      const fromPos = cardPos(cid);
      if (!fromPos) continue;
      svg.appendChild(makePath(fromPos, toPos, true, cid, course.id));
    }
  }
}

function makePath(from, to, isCoreq, fromId, toId) {
  const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
  p.className = isCoreq ? "arrow-coreq" : "arrow-prereq";
  p.dataset.from = fromId;
  p.dataset.to   = toId;
  p.dataset.type = isCoreq ? "coreq" : "prereq";

  const SAME_COL_THRESHOLD = 100; // px — treat as same column if centers are this close
  const sameCol = Math.abs(from.cx - to.cx) < SAME_COL_THRESHOLD;
  let d;

  if (sameCol) {
    // Same column: arc out to the right side of the column
    const bulge = Math.max(from.rx, to.rx) + 38;
    d = `M ${from.rx} ${from.cy} C ${bulge} ${from.cy} ${bulge} ${to.cy} ${to.rx} ${to.cy}`;
  } else if (from.cx < to.cx) {
    // Normal left-to-right bezier
    const dx = to.cx - from.cx;
    const c1x = from.rx + dx * 0.4;
    const c2x = to.lx   - dx * 0.4;
    d = `M ${from.rx} ${from.cy} C ${c1x} ${from.cy} ${c2x} ${to.cy} ${to.lx} ${to.cy}`;
  } else {
    // Right-to-left (rare coreq case)
    const dx = from.cx - to.cx;
    const c1x = from.lx - dx * 0.4;
    const c2x = to.rx   + dx * 0.4;
    d = `M ${from.lx} ${from.cy} C ${c1x} ${from.cy} ${c2x} ${to.cy} ${to.rx} ${to.cy}`;
  }

  p.setAttribute("d", d);
  p.setAttribute("marker-end", isCoreq ? "url(#mCo)" : "url(#mPre)");

  // Arrow tooltip
  p.style.pointerEvents = "stroke";
  p.addEventListener("mouseenter", ev => {
    const tip = document.getElementById("tooltip");
    const fc  = COURSES[fromId];
    const tc  = COURSES[toId];
    tip.textContent = `${fc ? fc.code : fromId} → ${tc ? tc.code : toId} (${isCoreq ? "co-req" : "prereq"})`;
    tip.style.left = (ev.clientX + 10) + "px";
    tip.style.top  = (ev.clientY - 28) + "px";
    tip.classList.add("vis");
  });
  p.addEventListener("mouseleave", () => document.getElementById("tooltip").classList.remove("vis"));

  return p;
}

function highlightArrows(selId, prereqs, coreqs, unlocks) {
  document.querySelectorAll("#arrow-svg path").forEach(p => {
    const f  = p.dataset.from;
    const t  = p.dataset.to;
    const ty = p.dataset.type;
    p.classList.remove("hi-prereq","hi-unlocked","hi-coreq","fade");

    if (ty === "prereq") {
      if (t === selId && prereqs.has(f)) {
        p.classList.add("hi-prereq");  p.setAttribute("marker-end","url(#mPreHi)");
      } else if (f === selId && unlocks.has(t)) {
        p.classList.add("hi-unlocked"); p.setAttribute("marker-end","url(#mUnHi)");
      } else {
        p.classList.add("fade");        p.setAttribute("marker-end","url(#mPre)");
      }
    } else {
      if ((f === selId && coreqs.has(t)) || (t === selId && coreqs.has(f))) {
        p.classList.add("hi-coreq");   p.setAttribute("marker-end","url(#mCoHi)");
      } else {
        p.classList.add("fade");        p.setAttribute("marker-end","url(#mCo)");
      }
    }
  });
}


// ╔══════════════════════════════════════════════════════════════╗
// ║  DETAIL PANEL                                                ║
// ╚══════════════════════════════════════════════════════════════╝
function openPanel(course, prereqs, coreqs, unlocks) {
  document.getElementById("panel-code").textContent    = course.code;
  document.getElementById("panel-title").textContent   = course.title;
  document.getElementById("panel-credits").textContent = course.credits + " credits";

  document.getElementById("panel-tags").innerHTML = (course.tags || []).map(t => {
    const def = TAGS[t];
    if (!def) return "";
    return `<span class="card-tag" style="background:${def.bg};color:${def.fg};font-size:.65rem;padding:.15rem .5rem">${def.label}</span>`;
  }).join("");

  document.getElementById("panel-desc").textContent = course.desc || "";

  function renderPills(ids, cssClass, elId) {
    const el = document.getElementById(elId);
    el.innerHTML = "";
    const arr = [...ids].filter(id => COURSES[id]);
    if (!arr.length) { el.innerHTML = '<span class="none-label">none</span>'; return; }
    arr.forEach(id => {
      const rc = COURSES[id];
      const sp = document.createElement("span");
      sp.className = "rel-pill " + cssClass;
      sp.textContent = rc.code;
      sp.title = rc.title;
      sp.onclick = () => selectCourse(id);
      el.appendChild(sp);
    });
  }

  renderPills(prereqs, "prereq-pill", "panel-prereqs");
  renderPills(coreqs,  "coreq-pill",  "panel-coreqs");
  renderPills(unlocks, "unlock-pill",  "panel-unlocked");

  const eligibleEl = document.getElementById("panel-eligible");
  if (course.isPlaceholder && course.eligible && course.eligible.length) {
    eligibleEl.innerHTML = `
      <h5>Eligible Courses</h5>
      <div class="eligible-panel-list">
        ${course.eligible.map(e => `<div class="eligible-panel-item">${e}</div>`).join("")}
      </div>`;
  } else {
    eligibleEl.innerHTML = "";
  }

  document.getElementById("detail-panel").classList.add("open");
}


// ╔══════════════════════════════════════════════════════════════╗
// ║  PROGRAM / TRACK SWITCHING                                   ║
// ╚══════════════════════════════════════════════════════════════╝
function setProgram(prog, btn) {
  STATE.program  = prog;
  STATE.selected = null;
  STATE.tag      = null;
  document.getElementById("detail-panel").classList.remove("open");
  document.querySelectorAll(".prog-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("track-selector").classList.toggle("visible", prog === "BE");
  document.querySelectorAll(".tag-filter-btn").forEach(b => b.classList.remove("active"));
  document.querySelector("[data-tag='all']").classList.add("active");
  render();
}

function setTrack(track, btn) {
  STATE.track    = track;
  STATE.selected = null;
  document.getElementById("detail-panel").classList.remove("open");
  document.querySelectorAll(".track-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  render();
}


// ╔══════════════════════════════════════════════════════════════╗
// ║  WINDOW EVENTS                                               ║
// ╚══════════════════════════════════════════════════════════════╝
let resizeTimer;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(drawArrows, 150);
});
document.getElementById("main-area").addEventListener("scroll", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(drawArrows, 60);
});


// ── INIT ──────────────────────────────────────────────────────
buildTagBar();
render();
</script>
