---
layout: default
---

{%- comment -%}
  Transcript Audit Layout
  Injects YAML data as JSON globals, loads pdf.js + transcript scripts.
  Used by _pages/transcript.html
{%- endcomment -%}

{%- include inject-courses.html -%}
<script>
  // ── Additional globals for transcript audit ────────────────
  const SITE_BASEURL   = {{ site.baseurl | jsonify }};
  const TAGS_DATA      = {{ site.data.tags | jsonify }};
  const SEMESTERS      = {{ site.data.semesters | jsonify }};
  const TAGS = {};
  TAGS_DATA.forEach(t => { TAGS[t.key] = { label: t.label, bg: t.bg, fg: t.fg }; });

  // ── Elective approved-course lists ──────────────────────────
  const ELECTIVE_DATA = {
    me_electives:            {{ site.data.transcript.me_electives | jsonify }},
    be_electives:            {{ site.data.transcript.be_electives | jsonify }},
    be_electives_biomech:    {{ site.data.transcript.be_electives_biomech | jsonify }},
    be_electives_bioelec:    {{ site.data.transcript.be_electives_bioelec | jsonify }},
    be_electives_biomed:     {{ site.data.transcript.be_electives_biomed | jsonify }},
    humanities:              {{ site.data.transcript.humanities | jsonify }},
    social_sciences:         {{ site.data.transcript.social_sciences | jsonify }},
    cultural_diversity:      {{ site.data.transcript.cultural_diversity | jsonify }},
    world_languages:         {{ site.data.transcript.world_languages | jsonify }},
    theology:                {{ site.data.transcript.theology | jsonify }},
    professional_electives:  {{ site.data.transcript.professional_electives | jsonify }},
    core1:                   {{ site.data.transcript.core1 | jsonify }},
    core2:                   {{ site.data.transcript.core2 | jsonify }},
  };

  // ── CAPS blanket substitutions ───────────────────────────
  const CAPS_DATA = {{ site.data.transcript.caps_substitutions | jsonify }};

  // ── Data-driven aliases ─────────────────────────────────
  const DEPT_RENAMES    = {{ site.data.aliases.department_renames | jsonify }};
  const COURSE_ALIASES  = {{ site.data.aliases.course_aliases | jsonify }};
  const WL_DEPTS        = {{ site.data.aliases.world_languages | jsonify }};

  // ── Minor definitions ─────────────────────────────────
  const MINORS_DATA = {
    {%- for pair in site.data.minors -%}
      {{ pair[0] | jsonify }}: {{ pair[1] | jsonify }}{% unless forloop.last %},{% endunless %}
    {%- endfor -%}
  };
</script>

{{ content }}

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script src="{{ '/assets/js/transcript-parser.js' | relative_url }}"></script>
<script src="{{ '/assets/js/transcript-audit.js' | relative_url }}"></script>
<script src="{{ '/assets/js/transcript-planner.js' | relative_url }}"></script>
<script src="{{ '/assets/js/transcript-minor.js' | relative_url }}"></script>
