---
layout: default
---

{%- comment -%}
  What-If Planner Layout
  Injects YAML data as JSON globals, then loads the planner JS engine.
  Used by _pages/planner.html
{%- endcomment -%}

{%- include inject-courses.html -%}
<script>
  // ── Additional globals for planner ──────────────────────────
  const SITE_BASEURL   = {{ site.baseurl | jsonify }};
  const TAGS_DATA      = {{ site.data.tags | jsonify }};
  const SEMESTERS      = {{ site.data.semesters | jsonify }};
  const TAGS = {};
  TAGS_DATA.forEach(t => { TAGS[t.key] = { label: t.label, bg: t.bg, fg: t.fg }; });

  // ── Minor definitions ─────────────────────────────────────
  const MINORS_DATA = {
    {%- for pair in site.data.minors -%}
      {{ pair[0] | jsonify }}: {{ pair[1] | jsonify }}{% unless forloop.last %},{% endunless %}
    {%- endfor -%}
  };

  // ── Christ College Scholar data ──────────────────────
  const CC_SCHOLAR_DATA = {{ site.data.cc_scholar | jsonify }};
</script>

{{ content }}

<script src="{{ '/assets/js/scheduling-utils.js' | relative_url }}"></script>
<script src="{{ '/assets/js/planner.js' | relative_url }}"></script>
