---
layout: default
---
<main class="page-content">
  {% if page.title %}
    <div class="page-hero">
      <h1>{{ page.title }}</h1>
      {% if page.subtitle %}
        <p class="page-subtitle">{{ page.subtitle }}</p>
      {% endif %}
    </div>
  {% endif %}
  <div class="page-body">
    {{ content }}
  </div>
</main>
