---
layout: default
---

{%- comment -%}
  Scheduler Layout
  Injects YAML course data as JSON globals, then loads scheduler scripts.
  Used by _pages/scheduler.html
{%- endcomment -%}

<script>
  {% assign all_courses = "" | split: "" %}
  {% for pair in site.data.courses %}
    {% assign all_courses = all_courses | concat: pair[1] %}
  {% endfor %}
  const COURSES_ARRAY = {{ all_courses | jsonify }};

  // Convert to keyed object by id
  const COURSES = {};
  COURSES_ARRAY.forEach(c => { COURSES[c.id] = c; });
</script>

{{ content }}

<!-- SheetJS for Excel export -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="{{ '/scheduler/js/parser.js' | relative_url }}"></script>
<script src="{{ '/scheduler/js/optimizer.js' | relative_url }}"></script>
<script src="{{ '/scheduler/js/scheduler-ui.js' | relative_url }}"></script>
