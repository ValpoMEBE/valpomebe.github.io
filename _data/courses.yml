# ║    semesters    — which semester per program:                 ║
# ║                     ME, BE_Biomech, BE_Bioelec, BE_Biomed    ║
# ║    isPlaceholder— true for elective/placeholder cards        ║
# ║    eligible     — list of eligible courses (for placeholders)║
# ║    desc         — description shown in detail panel          ║
